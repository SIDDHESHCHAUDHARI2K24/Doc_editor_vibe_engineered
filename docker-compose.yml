services:
  # ============================================
  # Valkey — Session store, pub/sub, rate limiting
  # ============================================
  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    command: valkey-server --appendonly yes
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - app_net
    restart: unless-stopped

  # ============================================
  # MinIO — S3-compatible object storage (local dev)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app_net
    restart: unless-stopped

  # ============================================
  # MinIO bootstrap — Creates default buckets on first run
  # ============================================
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/docs;
      mc mb -p local/snapshots;
      mc mb -p local/attachments;
      echo 'MinIO buckets created';
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app_net
    restart: "no"

volumes:
  valkey_data:
  minio_data:

networks:
  app_net:
    driver: bridge
